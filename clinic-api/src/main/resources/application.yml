spring:
  application:
    name: clinic-api
  datasource:
    url: jdbc:h2:mem:clinicdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# AliceMVC configuration
# alicemvc.exception-handler.enabled=false  # uncomment to disable built-in exception handler
